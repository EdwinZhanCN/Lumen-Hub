# Lumen Hub minimal beta config.
#
# Includes: SigLIP, InsightFace.
# Backend is selected at build time via cargo features (cpu, metal, cuda, ...).
# All models run on the Burn runtime.
#
# Total minimum requirement:
#   RAM: 8 GB
#   GPU/Unified memory: 4 GB

metadata:
    version: "0.1.0"
    region: other
    cache_dir: "~/.lumen/models"

deployment:
    mode: hub
    services:
        - siglip
        - face

server:
    host: "0.0.0.0"
    port: 50051
    batching:
        enabled: true
        max_batch_size: 8
        queue_latency_ms: 2

services:
    # Minimum: RAM 3 GB, GPU/Unified memory 2 GB.
    siglip:
        enabled: true
        package: siglip
        models:
            default:
                model: siglip2-base-patch16-224
                runtime: burn
                precision: fp16q8

    # Minimum: RAM 1 GB, GPU/Unified memory 1 GB.
    face:
        enabled: true
        package: insightface
        models:
            default:
                model: antelopev2
                runtime: burn
                precision: fp16q8
