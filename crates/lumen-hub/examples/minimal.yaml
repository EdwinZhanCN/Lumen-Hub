# Lumen Hub minimal profile.
#
# Services: SigLIP (semantic image/text), InsightFace (face).
# Covers the core of a traditional smart photo library: semantic search and
# face clustering.
#
# Backend is selected at build time via cargo features (cpu, metal, cuda, ...).
# All models run on the Burn runtime at fp16q8.
#
# Resource guidance (measured on Apple M2 Pro, Metal, fp16q8):
#   System RAM:      4 GB   (Hub working set ~1.7 GB + same-host Photos/OS).
#   GPU/Unified mem: 2 GB
#   Model disk:      ~1.3 GB
#
# Note: model weights are memory-mapped, so they load on demand and do not all
# count as resident RAM. A brief warmup spike (~4.5 GB unified) is reclaimed
# once startup completes.

metadata:
    version: "0.1.0"
    region: other
    cache_dir: "~/.lumen/models"

deployment:
    mode: hub
    services:
        - siglip
        - face

server:
    host: "0.0.0.0"
    port: 50051
    # Dynamic batching is off: on Metal/CubeCL batch>1 regresses per-image
    # latency, so concurrent batch-1 inference is faster and lower-memory.
    # See docs/lumen-hub-tensor-batching-decision.md.
    batching:
        enabled: false
        max_batch_size: 8
        queue_latency_ms: 2

services:
    # SigLIP base: semantic image + text embeddings (768-dim).
    siglip:
        enabled: true
        package: siglip
        models:
            default:
                model: siglip2-base-patch16-224
                runtime: burn
                precision: fp16q8

    # InsightFace antelopev2: face detection + recognition.
    face:
        enabled: true
        package: insightface
        models:
            default:
                model: antelopev2
                runtime: burn
                precision: fp16q8
