# Lumen Hub basic profile.
#
# Services: SigLIP (semantic), InsightFace (face), PP-OCR (text), BioCLIP
# (species). The full Lumilio Photos feature set on economical models: adds
# OCR text search and biodiversity classification on top of the minimal core.
#
# Backend is selected at build time via cargo features (cpu, metal, cuda, ...).
# All models run on the Burn runtime at fp16q8.
#
# Resource guidance (measured on Apple M2 Pro, Metal, fp16q8):
#   System RAM:      6 GB   (Hub working set ~2.4 GB under load + Photos/OS).
#   GPU/Unified mem: 3 GB
#   Model disk:      ~5.5 GB  (incl. BioCLIP TreeOfLife200MCore catalog).
#
# Note: model weights and the BioCLIP catalog are memory-mapped, so they load
# on demand and do not all count as resident RAM. A brief warmup spike
# (~4.5 GB unified) is reclaimed once startup completes.

metadata:
    version: "0.1.0"
    region: other
    cache_dir: "~/.lumen/models"

deployment:
    mode: hub
    services:
        - siglip
        - face
        - ocr
        - bioclip

server:
    host: "0.0.0.0"
    port: 50051
    # Dynamic batching is off: on Metal/CubeCL batch>1 regresses per-image
    # latency, so concurrent batch-1 inference is faster and lower-memory.
    # See docs/lumen-hub-tensor-batching-decision.md.
    batching:
        enabled: false
        max_batch_size: 8
        queue_latency_ms: 2

services:
    # SigLIP base: semantic image + text embeddings (768-dim).
    siglip:
        enabled: true
        package: siglip
        models:
            default:
                model: siglip2-base-patch16-224
                runtime: burn
                precision: fp16q8

    # InsightFace antelopev2: face detection + recognition.
    face:
        enabled: true
        package: insightface
        models:
            default:
                model: antelopev2
                runtime: burn
                precision: fp16q8

    # PP-OCRv6 small: in-image text detection + recognition.
    ocr:
        enabled: true
        package: ppocr
        models:
            default:
                model: pp-ocrv6-small
                runtime: burn
                precision: fp16q8

    # BioCLIP-2 with the TreeOfLife200MCore catalog: species classification.
    # Core is a curated subset of the full Tree of Life taxa, enough for
    # everyday biodiversity tagging at a fraction of the disk footprint.
    bioclip:
        enabled: true
        package: clip
        models:
            default:
                model: bioclip-2
                runtime: burn
                precision: fp16q8
                dataset: TreeOfLife200MCore
