# Lumen Hub brave beta config.
#
# Includes: SigLIP, InsightFace, OCR, BioCLIP.
# Backend is selected at build time via cargo features (cpu, metal, cuda, ...).
# All models run on the Burn runtime.
#
# Total minimum requirement:
#   RAM: 32 GB
#   GPU/Unified memory: 12 GB
#
# BioCLIP uses the full TreeOfLife200MCore dataset in this profile.

metadata:
    version: "0.1.0"
    region: other
    cache_dir: "~/.lumen/models"

deployment:
    mode: hub
    services:
        - siglip
        - face
        - ocr
        - bioclip

server:
    host: "0.0.0.0"
    port: 50051
    batching:
        enabled: true
        max_batch_size: 8
        queue_latency_ms: 2

services:
    # Minimum: RAM 4 GB, GPU/Unified memory 3 GB.
    siglip:
        enabled: true
        package: siglip
        models:
            default:
                model: siglip2-so400m-patch14-384
                runtime: burn
                precision: fp16q8

    # Minimum: RAM 1 GB, GPU/Unified memory 1 GB.
    face:
        enabled: true
        package: insightface
        models:
            default:
                model: antelopev2
                runtime: burn
                precision: fp16q8

    # Minimum: RAM 1 GB, GPU/Unified memory 512 MB.
    ocr:
        enabled: true
        package: ppocr
        models:
            default:
                model: pp-ocrv5-server
                runtime: burn
                precision: fp16q8

    # Minimum: RAM 16 GB, GPU/Unified memory 4 GB.
    bioclip:
        enabled: true
        package: clip
        models:
            default:
                model: bioclip-2
                runtime: burn
                precision: fp16q8
                dataset: TreeOfLife200MCore
