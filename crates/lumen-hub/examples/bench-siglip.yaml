# Lumen Hub benchmark config: SigLIP semantic image embedding only.
#
# Scenario:
#   - Hub service: siglip
#   - Benchmark task: semantic_image_embed
#   - Dataset: COCO val2017 sample-500
#
# Notes:
#   - Backend is selected at build time via cargo features (cpu, metal, cuda, ...).
#   - mDNS is disabled because benchmark clients should use a static gRPC address.
#   - Tensor batching is disabled: on Metal/CubeCL, batch>1 vision inference
#     costs more GPU time per image than pipelined batch-1 jobs (see
#     docs/lumen-hub-runtime-memory-decision.md follow-up benchmarks).

metadata:
  version: "0.1.0"
  region: other
  cache_dir: "~/.lumen/models"

deployment:
  mode: hub
  services:
    - siglip

server:
  host: "127.0.0.1"
  port: 50051
  mdns:
    enabled: false
  batching:
    enabled: false
    max_batch_size: 8
    queue_latency_ms: 2

services:
  siglip:
    enabled: true
    package: siglip
    models:
      default:
        model: siglip2-base-patch16-224
        runtime: burn
        precision: fp16q8
