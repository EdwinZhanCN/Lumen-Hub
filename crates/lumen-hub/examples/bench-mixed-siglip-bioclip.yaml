# Lumen Hub benchmark config: mixed SigLIP + BioCLIP workload.
#
# Scenario:
#   - Hub services: siglip, bioclip
#   - Benchmark tasks: semantic_image_embed, bioclip_classify
#   - Dataset: mixed sample-500, routed by filename prefix:
#       siglip_*  -> semantic_image_embed
#       bioclip_* -> bioclip_classify
#
# Notes:
#   - Backend is selected at build time via cargo features (cpu, metal, cuda, ...).
#   - mDNS is disabled because benchmark clients should use a static gRPC address.
#   - Tensor batching is disabled: batch>1 regresses on Metal/CubeCL
#     (see docs/lumen-hub-tensor-batching-decision.md).

metadata:
  version: "0.1.0"
  region: other
  cache_dir: "~/.lumen/models"

deployment:
  mode: hub
  services:
    - siglip
    - bioclip

server:
  host: "127.0.0.1"
  port: 50051
  mdns:
    enabled: false
  batching:
    enabled: false
    max_batch_size: 8
    queue_latency_ms: 2

services:
  siglip:
    enabled: true
    package: siglip
    models:
      default:
        model: siglip2-base-patch16-224
        runtime: burn
        precision: fp16q8

  bioclip:
    enabled: true
    package: clip
    models:
      default:
        model: bioclip-2
        runtime: burn
        precision: fp16q8
        dataset: TreeOfLife200MCore
