name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    workspace:
        name: fmt + test (cpu)
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.94.1"
                  components: rustfmt, clippy
            - uses: Swatinem/rust-cache@v2
            - name: Format
              run: cargo fmt --all -- --check
            # Default backend is `cpu` (burn-ndarray). E2E model tests skip
            # gracefully when LUMEN_MODELS_DIR has no assets, so the workspace
            # suite is self-contained on CI.
            - name: Test workspace
              run: cargo test --workspace

    backends:
        name: build ${{ matrix.backend }} (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - backend: cpu
                      os: ubuntu-24.04
                    - backend: wgpu
                      os: ubuntu-24.04
                    - backend: vulkan
                      os: ubuntu-24.04
                    - backend: metal
                      os: macos-15
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.94.1"
            - uses: Swatinem/rust-cache@v2
            # Verify lumen-hub compiles with the full model set on each backend.
            - name: Check backend
              run: >
                  cargo check -p lumen-hub --no-default-features
                  --features ${{ matrix.backend }},siglip,ppocr,insightface,clip

    # CUDA / ROCm require vendor toolkits to compile (cubecl-cuda / cubecl-rocm)
    # and are not exercised on hosted runners; they are validated on
    # self-hosted GPU machines out-of-band.
