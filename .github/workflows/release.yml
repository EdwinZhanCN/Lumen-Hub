name: Release Profiles

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    dist:
        name: hub-${{ matrix.profile }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - profile: universal-cpu
                      os: ubuntu-24.04
                      archive: lumen-hub-universal-cpu.tar.gz
                    - profile: darwin-arm64
                      os: macos-15
                      archive: lumen-hub-darwin-arm64.tar.gz
                    - profile: linux-x64-cuda
                      os: ubuntu-24.04
                      archive: lumen-hub-linux-x64-cuda.tar.gz
                    - profile: linux-arm64
                      os: ubuntu-22.04-arm
                      archive: lumen-hub-linux-arm64.tar.gz
                    - profile: linux-arm64-jetson
                      os: ubuntu-22.04-arm
                      archive: lumen-hub-linux-arm64-jetson.tar.gz
                    - profile: windows-x64-dml
                      os: windows-2025
                      archive: lumen-hub-windows-x64-dml.zip
                    - profile: linux-x64-openvino
                      os: ubuntu-24.04
                      archive: lumen-hub-linux-x64-openvino.tar.gz

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@stable

            - name: Test universal CPU profile
              if: matrix.profile == 'universal-cpu'
              run: cargo test -p lumen-hub --no-default-features --features profile-universal-cpu

            - name: Basic Windows DML smoke
              if: matrix.profile == 'windows-x64-dml'
              env:
                  RUSTFLAGS: -C target-feature=-crt-static
                  CFLAGS: /MD
                  CXXFLAGS: /MD
              run: cargo test -p lumen-hub --no-default-features --features profile-windows-x64-dml

            - name: Build hub dist profile
              env:
                  RUSTFLAGS: ${{ matrix.profile == 'windows-x64-dml' && '-C target-feature=-crt-static' || '' }}
                  CFLAGS: ${{ matrix.profile == 'windows-x64-dml' && '/MD' || '' }}
                  CXXFLAGS: ${{ matrix.profile == 'windows-x64-dml' && '/MD' || '' }}
              run: cargo xtask dist --profile ${{ matrix.profile }}

            - name: Check hub dist layout
              shell: pwsh
              run: |
                  $artifact = Join-Path "dist" "lumen-hub-${{ matrix.profile }}"
                  if (!(Test-Path (Join-Path $artifact "README.md"))) { throw "missing README.md" }
                  if (!(Test-Path (Join-Path $artifact "checksums.txt"))) { throw "missing checksums.txt" }
                  if (!(Test-Path (Join-Path $artifact "bin"))) { throw "missing bin directory" }
                  if (!(Test-Path (Join-Path $artifact "lib"))) { throw "missing lib directory" }
                  if (!(Test-Path (Join-Path $artifact "licenses"))) { throw "missing licenses directory" }

                  if ($env:RUNNER_OS -eq "Windows") {
                    if (!(Test-Path (Join-Path $artifact "bin/lumen-hub.exe"))) { throw "missing bin/lumen-hub.exe" }
                  } else {
                    if (!(Test-Path (Join-Path $artifact "bin/lumen-hub"))) { throw "missing bin/lumen-hub" }
                  }

            - name: Check OpenVINO dynamic runtime bundle
              if: matrix.profile == 'linux-x64-openvino'
              shell: pwsh
              run: |
                  $artifact = Join-Path "dist" "lumen-hub-${{ matrix.profile }}"
                  if (!(Test-Path (Join-Path $artifact "bin/lumen-hub-bin"))) { throw "missing bin/lumen-hub-bin" }
                  if (!(Test-Path (Join-Path $artifact "lib/libonnxruntime.so"))) { throw "missing lib/libonnxruntime.so" }
                  if (!(Test-Path (Join-Path $artifact "lib/libonnxruntime_providers_openvino.so"))) { throw "missing OpenVINO provider library" }
                  if (!(Test-Path (Join-Path $artifact "licenses/openvino/README.md"))) { throw "missing OpenVINO notice" }

            - name: Check MNN dynamic runtime bundle
              if: contains(fromJSON('["darwin-arm64", "linux-arm64"]'), matrix.profile)
              shell: pwsh
              run: |
                  $artifact = Join-Path "dist" "lumen-hub-${{ matrix.profile }}"
                  $mnnLib = if ($env:RUNNER_OS -eq "macOS") { "lib/libMNN.dylib" } else { "lib/libMNN.so" }
                  if (!(Test-Path (Join-Path $artifact "bin/lumen-hub-bin"))) { throw "missing bin/lumen-hub-bin" }
                  if (!(Test-Path (Join-Path $artifact $mnnLib))) { throw "missing $mnnLib" }
                  if (!(Test-Path (Join-Path $artifact "licenses/mnn/README.md"))) { throw "missing MNN notice" }

            - uses: actions/upload-artifact@v4
              with:
                  name: hub-${{ matrix.profile }}
                  path: dist/${{ matrix.archive }}
                  if-no-files-found: error

    cli-local:
        name: cli-${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-14
                      archive: lumen-cli-aarch64-apple-darwin.tar.xz
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-22.04
                      archive: lumen-cli-x86_64-unknown-linux-gnu.tar.xz
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-22.04-arm
                      archive: lumen-cli-aarch64-unknown-linux-gnu.tar.xz
                    - target: x86_64-pc-windows-msvc
                      os: windows-2022
                      archive: lumen-cli-x86_64-pc-windows-msvc.zip

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@stable

            - name: Install cargo-dist
              if: runner.os != 'Windows'
              run: |
                  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
                  echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

            - name: Install cargo-dist
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  irm https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.ps1 | iex
                  "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

            - name: Build lumen-cli with cargo-dist
              shell: bash
              run: |
                  dist build --artifacts=local --target=${{ matrix.target }} --tag=${{ github.ref_name }} --allow-dirty --output-format=json > dist-manifest.json
                  cp dist-manifest.json "target/distrib/${{ matrix.target }}-dist-manifest.json"

            - uses: actions/upload-artifact@v4
              with:
                  name: cli-${{ matrix.target }}
                  path: |
                      target/distrib/${{ matrix.archive }}
                      target/distrib/${{ matrix.archive }}.sha256
                      target/distrib/${{ matrix.target }}-dist-manifest.json
                  if-no-files-found: error

    cli-global:
        name: cli-installers
        runs-on: ubuntu-22.04
        needs:
            - cli-local

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@stable

            - name: Download CLI archives
              uses: actions/download-artifact@v4
              with:
                  pattern: cli-*
                  path: target/distrib
                  merge-multiple: true

            - name: Install cargo-dist
              run: |
                  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
                  echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

            - name: Build lumen-cli installers with cargo-dist
              run: dist build --artifacts=global --tag=${{ github.ref_name }} --allow-dirty

            - name: Check cargo-dist installer metadata
              shell: bash
              run: |
                  set -euo pipefail
                  test -s target/distrib/sha256.sum
                  grep -Fq "lumen-cli-aarch64-apple-darwin.tar.xz" target/distrib/sha256.sum
                  grep -Fq "lumen-cli-aarch64-unknown-linux-gnu.tar.xz" target/distrib/sha256.sum
                  grep -Fq "lumen-cli-x86_64-unknown-linux-gnu.tar.xz" target/distrib/sha256.sum
                  grep -Fq "lumen-cli-x86_64-pc-windows-msvc.zip" target/distrib/sha256.sum
                  grep -Fq '_checksum_value=' target/distrib/lumen-cli-installer.sh

            - uses: actions/upload-artifact@v4
              with:
                  name: cli-installers
                  path: |
                      target/distrib/lumen-cli-installer.sh
                      target/distrib/lumen-cli-installer.ps1
                      target/distrib/sha256.sum
                  if-no-files-found: error

    metadata:
        name: metadata
        runs-on: ubuntu-24.04
        needs:
            - dist
            - cli-local
            - cli-global

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@stable

            - name: Download archives
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Generate hub manifest and top-level checksums
              env:
                  LUMEN_RELEASE_VERSION: ${{ github.ref_name }}
                  LUMEN_RELEASE_BASE_URL: https://github.com/EdwinZhanCN/Lumen-Hub/releases/download/${{ github.ref_name }}
              run: cargo xtask release-metadata --assets-dir release-assets

            - uses: actions/upload-artifact@v4
              with:
                  name: metadata
                  path: |
                      release-assets/manifest.json
                      release-assets/checksums.txt
                  if-no-files-found: error

    release:
        name: Create GitHub Release
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        needs:
            - dist
            - cli-local
            - cli-global
            - metadata
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - name: Download release assets
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Check release assets
              run: |
                  set -euo pipefail

                  test -f release-assets/lumen-hub-universal-cpu.tar.gz
                  test -f release-assets/lumen-hub-darwin-arm64.tar.gz
                  test -f release-assets/lumen-hub-linux-x64-cuda.tar.gz
                  test -f release-assets/lumen-hub-linux-arm64.tar.gz
                  test -f release-assets/lumen-hub-linux-arm64-jetson.tar.gz
                  test -f release-assets/lumen-hub-windows-x64-dml.zip
                  test -f release-assets/lumen-hub-linux-x64-openvino.tar.gz
                  test -f release-assets/lumen-cli-aarch64-apple-darwin.tar.xz
                  test -f release-assets/lumen-cli-aarch64-apple-darwin.tar.xz.sha256
                  test -f release-assets/lumen-cli-aarch64-unknown-linux-gnu.tar.xz
                  test -f release-assets/lumen-cli-aarch64-unknown-linux-gnu.tar.xz.sha256
                  test -f release-assets/lumen-cli-x86_64-unknown-linux-gnu.tar.xz
                  test -f release-assets/lumen-cli-x86_64-unknown-linux-gnu.tar.xz.sha256
                  test -f release-assets/lumen-cli-x86_64-pc-windows-msvc.zip
                  test -f release-assets/lumen-cli-x86_64-pc-windows-msvc.zip.sha256
                  test -f release-assets/lumen-cli-installer.sh
                  test -f release-assets/lumen-cli-installer.ps1
                  test -f release-assets/sha256.sum
                  test -f release-assets/manifest.json
                  test -f release-assets/checksums.txt

                  ls -lah release-assets

            - name: Build release body
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.ref_name }}
              run: |
                  set -euo pipefail

                  gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
                    -f tag_name="$TAG" \
                    --jq .body > generated-notes.md

                  cat > release-body.md <<EOF
                  # ${TAG}

                  ## Install

                  macOS/Linux:
                  \`\`\`bash
                  curl --proto '=https' --tlsv1.2 -LsSf https://lumilio.org/lumen/install.sh | sh
                  lumen-cli init
                  lumen-cli start
                  \`\`\`

                  Windows:
                  \`\`\`powershell
                  powershell -ExecutionPolicy Bypass -c "irm https://lumilio.org/lumen/install.ps1 | iex"
                  lumen-cli init
                  lumen-cli start
                  \`\`\`

                  ## Artifact Matrix

                  | Kind | Profile / Target | Archive |
                  |---|---|---|
                  | Hub | \`universal-cpu\` | \`lumen-hub-universal-cpu.tar.gz\` |
                  | Hub | \`darwin-arm64\` | \`lumen-hub-darwin-arm64.tar.gz\` |
                  | Hub | \`linux-x64-cuda\` | \`lumen-hub-linux-x64-cuda.tar.gz\` |
                  | Hub | \`linux-arm64\` | \`lumen-hub-linux-arm64.tar.gz\` |
                  | Hub | \`linux-arm64-jetson\` | \`lumen-hub-linux-arm64-jetson.tar.gz\` |
                  | Hub | \`windows-x64-dml\` | \`lumen-hub-windows-x64-dml.zip\` |
                  | Hub | \`linux-x64-openvino\` | \`lumen-hub-linux-x64-openvino.tar.gz\` |
                  | CLI | \`aarch64-apple-darwin\` | \`lumen-cli-aarch64-apple-darwin.tar.xz\` |
                  | CLI | \`aarch64-unknown-linux-gnu\` | \`lumen-cli-aarch64-unknown-linux-gnu.tar.xz\` |
                  | CLI | \`x86_64-unknown-linux-gnu\` | \`lumen-cli-x86_64-unknown-linux-gnu.tar.xz\` |
                  | CLI | \`x86_64-pc-windows-msvc\` | \`lumen-cli-x86_64-pc-windows-msvc.zip\` |
                  | CLI installer | macOS/Linux | \`lumen-cli-installer.sh\` |
                  | CLI installer | Windows | \`lumen-cli-installer.ps1\` |

                  ## Generated Notes
                  EOF
                  cat generated-notes.md >> release-body.md

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  fail_on_unmatched_files: true
                  body_path: release-body.md
                  files: |
                      release-assets/lumen-hub-universal-cpu.tar.gz
                      release-assets/lumen-hub-darwin-arm64.tar.gz
                      release-assets/lumen-hub-linux-x64-cuda.tar.gz
                      release-assets/lumen-hub-linux-arm64.tar.gz
                      release-assets/lumen-hub-linux-arm64-jetson.tar.gz
                      release-assets/lumen-hub-windows-x64-dml.zip
                      release-assets/lumen-hub-linux-x64-openvino.tar.gz
                      release-assets/lumen-cli-aarch64-apple-darwin.tar.xz
                      release-assets/lumen-cli-aarch64-apple-darwin.tar.xz.sha256
                      release-assets/lumen-cli-aarch64-unknown-linux-gnu.tar.xz
                      release-assets/lumen-cli-aarch64-unknown-linux-gnu.tar.xz.sha256
                      release-assets/lumen-cli-x86_64-unknown-linux-gnu.tar.xz
                      release-assets/lumen-cli-x86_64-unknown-linux-gnu.tar.xz.sha256
                      release-assets/lumen-cli-x86_64-pc-windows-msvc.zip
                      release-assets/lumen-cli-x86_64-pc-windows-msvc.zip.sha256
                      release-assets/lumen-cli-installer.sh
                      release-assets/lumen-cli-installer.ps1
                      release-assets/sha256.sum
                      release-assets/manifest.json
                      release-assets/checksums.txt
