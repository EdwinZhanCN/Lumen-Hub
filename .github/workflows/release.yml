name: Release Profiles

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    # Burn statically links its compute backend, so each hub archive is just the
    # binaries + warmup assets + license (no ONNX Runtime / MNN libraries).
    # `*-gpu` = wgpu (Vulkan/GL/DX12 at runtime). `cuda`/`rocm` install their
    # vendor toolkit in-job (no GPU needed to build). `jetson` is the arm64 CUDA
    # build done inside an L4T container for ABI-correct Tegra artifacts. GPU
    # profiles are build-and-package only; GPU E2E happens on self-hosted runners.
    dist:
        name: hub-${{ matrix.profile }}
        runs-on: ${{ matrix.os }}
        container: ${{ matrix.container }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # macOS
                    - { profile: darwin-arm64-metal, os: macos-15 }
                    - { profile: darwin-arm64-cpu, os: macos-15 }
                    # Windows
                    - { profile: windows-x64-cpu, os: windows-2025 }
                    - { profile: windows-x64-gpu, os: windows-2025 }
                    # Linux x64
                    - { profile: linux-x64-cpu, os: ubuntu-24.04 }
                    - { profile: linux-x64-gpu, os: ubuntu-24.04 }
                    - { profile: linux-x64-cuda, os: ubuntu-24.04, toolkit: cuda }
                    - { profile: linux-x64-rocm, os: ubuntu-24.04, toolkit: rocm }
                    # Linux arm64
                    - { profile: linux-arm64-cpu, os: ubuntu-24.04-arm }
                    - { profile: linux-arm64-gpu, os: ubuntu-24.04-arm }
                    - {
                          profile: linux-arm64-jetson,
                          os: ubuntu-24.04-arm,
                          container: "nvcr.io/nvidia/l4t-cuda:12.2.12-devel",
                      }

        steps:
            - name: Install container base deps
              if: matrix.container != ''
              run: apt-get update && apt-get install -y --no-install-recommends curl ca-certificates build-essential pkg-config git

            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            # dtolnay's action needs a normal runner; inside the L4T container we
            # bootstrap rustup directly.
            - name: Install Rust (host runner)
              if: matrix.container == ''
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.94.1"

            - name: Install Rust (container)
              if: matrix.container != ''
              run: |
                  curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.94.1 --profile minimal
                  echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

            - name: Install CUDA toolkit
              if: matrix.toolkit == 'cuda'
              uses: Jimver/cuda-toolkit@v0.2.21
              with:
                  method: network

            # cubecl-hip-sys 7.1.5280200 (pinned by cubecl-hip 0.10) ships HIP
            # 52802 bindings, which require ROCm 7.1.1 — its build.rs reads
            # `hipconfig --version` and enables the matching feature, so the
            # installed ROCm must match exactly (7.1.0 bindings are unreleased).
            - name: Install ROCm toolkit
              if: matrix.toolkit == 'rocm'
              run: |
                  set -euo pipefail
                  sudo apt-get update
                  sudo apt-get install -y wget gnupg
                  sudo mkdir -p /etc/apt/keyrings
                  wget -qO - https://repo.radeon.com/rocm/rocm.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
                  echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/7.1.1 noble main' | sudo tee /etc/apt/sources.list.d/rocm.list
                  # Ubuntu 24.04 universe ships conflicting rocminfo/rocm-cmake/hipcc
                  # versions; prefer the AMD repo so the SDK's pinned deps resolve.
                  printf 'Package: *\nPin: origin "repo.radeon.com"\nPin-Priority: 600\n' | sudo tee /etc/apt/preferences.d/rocm-pin-600
                  sudo apt-get update
                  sudo apt-get install -y rocm-hip-sdk
                  # cubecl-hip-sys build.rs locates HIP via these + `hipconfig`.
                  echo "/opt/rocm/bin" >> "$GITHUB_PATH"
                  echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"
                  echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
                  /opt/rocm/bin/hipconfig --version

            # Each runner builds its own native target; no cross toolchain needed.
            - name: Build hub dist profile
              run: cargo xtask dist --profile ${{ matrix.profile }}

            # bash, not pwsh: PowerShell isn't present in the L4T container.
            - name: Check hub dist layout
              shell: bash
              run: |
                  set -euo pipefail
                  art="dist/lumen-hub-${{ matrix.profile }}"
                  test -f "$art/README.md"
                  test -f "$art/LICENSE"
                  test -d "$art/bin"
                  if [ "${RUNNER_OS:-}" = "Windows" ]; then
                    test -f "$art/bin/lumen-hub.exe"
                  else
                    test -f "$art/bin/lumen-hub"
                  fi

            - uses: actions/upload-artifact@v4
              with:
                  name: hub-${{ matrix.profile }}
                  path: dist/lumen-hub-${{ matrix.profile }}.zip
                  if-no-files-found: error

    cli-local:
        name: cli-${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-14
                      archive: lumen-cli-aarch64-apple-darwin.tar.xz
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-22.04
                      archive: lumen-cli-x86_64-unknown-linux-gnu.tar.xz
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-22.04-arm
                      archive: lumen-cli-aarch64-unknown-linux-gnu.tar.xz
                    - target: x86_64-pc-windows-msvc
                      os: windows-2022
                      archive: lumen-cli-x86_64-pc-windows-msvc.zip

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@stable

            - name: Install cargo-dist
              if: runner.os != 'Windows'
              run: |
                  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
                  echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

            - name: Install cargo-dist
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  irm https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.ps1 | iex
                  "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

            - name: Build lumen-cli with cargo-dist
              shell: bash
              run: |
                  dist build --artifacts=local --target=${{ matrix.target }} --tag=${{ github.ref_name }} --allow-dirty --output-format=json > dist-manifest.json
                  cp dist-manifest.json "target/distrib/${{ matrix.target }}-dist-manifest.json"

            - uses: actions/upload-artifact@v4
              with:
                  name: cli-${{ matrix.target }}
                  path: |
                      target/distrib/${{ matrix.archive }}
                      target/distrib/${{ matrix.archive }}.sha256
                      target/distrib/${{ matrix.target }}-dist-manifest.json
                  if-no-files-found: error

    cli-global:
        name: cli-installers
        runs-on: ubuntu-22.04
        needs:
            - cli-local

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@stable

            - name: Download CLI archives
              uses: actions/download-artifact@v4
              with:
                  pattern: cli-*
                  path: target/distrib
                  merge-multiple: true

            - name: Install cargo-dist
              run: |
                  curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
                  echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

            - name: Build lumen-cli installers with cargo-dist
              run: dist build --artifacts=global --tag=${{ github.ref_name }} --allow-dirty

            - uses: actions/upload-artifact@v4
              with:
                  name: cli-installers
                  path: |
                      target/distrib/lumen-cli-installer.sh
                      target/distrib/lumen-cli-installer.ps1
                      target/distrib/sha256.sum
                  if-no-files-found: error

    metadata:
        name: metadata
        runs-on: ubuntu-24.04
        needs:
            - dist
            - cli-local
            - cli-global

        steps:
            - uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: "1.94.1"

            - name: Download archives
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Generate hub manifest and top-level checksums
              env:
                  LUMEN_RELEASE_VERSION: ${{ github.ref_name }}
                  LUMEN_RELEASE_BASE_URL: https://github.com/EdwinZhanCN/Lumen-Hub/releases/download/${{ github.ref_name }}
              run: cargo xtask release-metadata --assets-dir release-assets

            - uses: actions/upload-artifact@v4
              with:
                  name: metadata
                  path: |
                      release-assets/manifest.json
                      release-assets/checksums.txt
                  if-no-files-found: error

    release:
        name: Create GitHub Release
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        needs:
            - dist
            - cli-local
            - cli-global
            - metadata
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - name: Download release assets
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Check release assets
              run: |
                  set -euo pipefail
                  for p in darwin-arm64-metal darwin-arm64-cpu \
                           windows-x64-cpu windows-x64-gpu \
                           linux-x64-cpu linux-x64-gpu linux-x64-cuda linux-x64-rocm \
                           linux-arm64-cpu linux-arm64-gpu linux-arm64-jetson; do
                    test -f "release-assets/lumen-hub-${p}.zip"
                  done
                  test -f release-assets/lumen-cli-installer.sh
                  test -f release-assets/lumen-cli-installer.ps1
                  test -f release-assets/sha256.sum
                  test -f release-assets/manifest.json
                  test -f release-assets/checksums.txt
                  ls -lah release-assets

            - name: Build release body
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ github.ref_name }}
              run: |
                  set -euo pipefail
                  gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
                    -f tag_name="$TAG" \
                    --jq .body > generated-notes.md
                  cat > release-body.md <<EOF
                  # ${TAG}

                  ## Install

                  macOS/Linux:
                  \`\`\`bash
                  curl --proto '=https' --tlsv1.2 -LsSf https://lumilio.org/lumen/install.sh | sh
                  lumen-cli init
                  lumen-cli start
                  \`\`\`

                  Windows:
                  \`\`\`powershell
                  powershell -ExecutionPolicy Bypass -c "irm https://lumilio.org/lumen/install.ps1 | iex"
                  lumen-cli init
                  lumen-cli start
                  \`\`\`

                  ## Hub artifacts (Burn backends)

                  | Profile | Backend | Archive |
                  |---|---|---|
                  | \`darwin-arm64-metal\` | Metal | \`lumen-hub-darwin-arm64-metal.zip\` |
                  | \`darwin-arm64-cpu\` | CPU | \`lumen-hub-darwin-arm64-cpu.zip\` |
                  | \`windows-x64-cpu\` | CPU | \`lumen-hub-windows-x64-cpu.zip\` |
                  | \`windows-x64-gpu\` | wgpu (DX12/Vulkan) | \`lumen-hub-windows-x64-gpu.zip\` |
                  | \`linux-x64-cpu\` | CPU | \`lumen-hub-linux-x64-cpu.zip\` |
                  | \`linux-x64-gpu\` | wgpu (Vulkan/GL) | \`lumen-hub-linux-x64-gpu.zip\` |
                  | \`linux-x64-cuda\` | CUDA | \`lumen-hub-linux-x64-cuda.zip\` |
                  | \`linux-x64-rocm\` | ROCm | \`lumen-hub-linux-x64-rocm.zip\` |
                  | \`linux-arm64-cpu\` | CPU | \`lumen-hub-linux-arm64-cpu.zip\` |
                  | \`linux-arm64-gpu\` | wgpu (Vulkan/GL) | \`lumen-hub-linux-arm64-gpu.zip\` |
                  | \`linux-arm64-jetson\` | CUDA (L4T) | \`lumen-hub-linux-arm64-jetson.zip\` |

                  ## Generated Notes
                  EOF
                  cat generated-notes.md >> release-body.md

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  fail_on_unmatched_files: true
                  body_path: release-body.md
                  files: |
                      release-assets/lumen-hub-darwin-arm64-metal.zip
                      release-assets/lumen-hub-darwin-arm64-cpu.zip
                      release-assets/lumen-hub-windows-x64-cpu.zip
                      release-assets/lumen-hub-windows-x64-gpu.zip
                      release-assets/lumen-hub-linux-x64-cpu.zip
                      release-assets/lumen-hub-linux-x64-gpu.zip
                      release-assets/lumen-hub-linux-x64-cuda.zip
                      release-assets/lumen-hub-linux-x64-rocm.zip
                      release-assets/lumen-hub-linux-arm64-cpu.zip
                      release-assets/lumen-hub-linux-arm64-gpu.zip
                      release-assets/lumen-hub-linux-arm64-jetson.zip
                      release-assets/lumen-cli-aarch64-apple-darwin.tar.xz
                      release-assets/lumen-cli-aarch64-apple-darwin.tar.xz.sha256
                      release-assets/lumen-cli-aarch64-unknown-linux-gnu.tar.xz
                      release-assets/lumen-cli-aarch64-unknown-linux-gnu.tar.xz.sha256
                      release-assets/lumen-cli-x86_64-unknown-linux-gnu.tar.xz
                      release-assets/lumen-cli-x86_64-unknown-linux-gnu.tar.xz.sha256
                      release-assets/lumen-cli-x86_64-pc-windows-msvc.zip
                      release-assets/lumen-cli-x86_64-pc-windows-msvc.zip.sha256
                      release-assets/lumen-cli-installer.sh
                      release-assets/lumen-cli-installer.ps1
                      release-assets/sha256.sum
                      release-assets/manifest.json
                      release-assets/checksums.txt
